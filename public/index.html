<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/styles/main.css">
  <title>GaloFrame — Cada clique, uma história alvinegra</title>
  <style>
    
  </style>
</head>
<body>

  <section class="hero">
    <header>
      <div class="logo">
        GaloFrame
        <div class="logo-dot"></div>
      </div>
      <button class="cta-button" style="padding: 10px 28px; font-size: 1rem;">Entrar</button>
    </header>

    <div class="container">
      <div class="hero-content">
        <h1>Cada clique,<br>uma história alvinegra.</h1>
        <p>Registre seus momentos com o Galo. Fotos, vibes, celebrações e memórias do Maior de Minas — tudo em um espaço aesthetic só para a torcida alvinegra.</p>

        <button class="cta-button">
          Explorar GaloFrame
        </button>

        <div class="qr-section">
          <div>
            <div class="qr-box">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://instagram.com/gusttaftn" 
                   alt="QR Code" class="qr-code">
            </div>
            <p style="margin-top: 14px; font-size: 1.1rem;">Escaneie para ver nossas redes</p>
          </div>

          <div class="app-stores">
            <a href="#" class="store-btn">
              <span style="font-size: 30px;"></span>
              <div>
                <small>Disponível na</small><br>
                <strong>App Store</strong>
              </div>
            </a>
            <a href="#" class="store-btn">
              <span style="font-size: 28px;">▶</span>
              <div>
                <small>Disponível na</small><br>
                <strong>Google Play</strong>
              </div>
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="scroll-hint">
      <svg width="36" height="36" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M19 9l-7 7-7-7"/>
      </svg>
    </div>
  </section>

  <script src="./assets/scripts/app.js"></script>
</body>
</html>
