<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/styles/studio.css">
    <script src="https://unpkg.com/dexie@4.0.8/dist/dexie.min.js"></script>
    <link rel="icon" href="assets/images/logo.png">
    <title>GaloFrame - Estúdio</title>
   
</head>
<body>

    <header>
 
        <div class="nav">
      <div class="logo" onclick="window.location.href='home.html'">
        <span class="destaque">Galo</span>Frame <div class="logo-dot"></div>
      </div>
      
      <input type="text" class="search-bar" placeholder="Buscar momentos alvinegros...">

      
      <div class="main-nav">
        <a href="home.html">
          <div class="nav-item">
            Início
          </div>
        </a>
        <a href="feed.html">
          <div class="nav-item">
            Feed
          </div>
        </a>
        <a href="studio.html">
          <div class="nav-item">
            Studio
          </div>
        </a>
        <a href="perfil.html">
        <div class="nav-item">
          Perfil  
        </div>
       </a>

      </div>
    </header>

    <div id="imageGrid" class="grid"></div>

    <div class="empty" id="emptyMessage">
        <p>Nenhuma imagem ainda.<br>Clique no + para adicionar</p>
    </div>

    <!-- Botão flutuante -->
    <div class="floating-upload" onclick="openUploadModal()">
        <svg width="28" height="28" viewBox="0 0 24 24">
            <path d="M12 5V19M5 12H19" stroke="white" stroke-width="3" stroke-linecap="round"/>
        </svg>
    </div>

    <!-- Input escondido -->
    <input type="file" id="imageUpload" accept="image/*" style="display: none;">

    <script src="./assets/scripts/studio.js">
        
    </script>
</body>
</html>
